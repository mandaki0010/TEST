version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-30m}
      DATABASE_PATH: /app/data/employees.db
      FRONTEND_URL: http://localhost:3000
      SESSION_TIMEOUT: ${SESSION_TIMEOUT:-1800000}
    volumes:
      - sqlite_data:/app/data
      - backend_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      # REACT_APP_API_URL を未設定にすることで nginx が /api/ をバックエンドへプロキシ
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlite_data:
  backend_logs:
