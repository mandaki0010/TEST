substitutions:
  _REGION: asia-northeast1
  _BACKEND_SERVICE: backend
  _FRONTEND_SERVICE: frontend
  # デプロイ後に確定するバックエンドの Cloud Run URL を設定
  # 初回デプロイ後、実際の URL に書き換えてください
  _BACKEND_URL: https://backend-placeholder.a.run.app

steps:
  # ──────────────────────────────────────────
  # 1. Backend イメージのビルド
  # ──────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-backend
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:latest
      - ./backend

  # ──────────────────────────────────────────
  # 2. Backend イメージのプッシュ
  # ──────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-backend
    waitFor: [build-backend]
    args:
      - push
      - --all-tags
      - gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}

  # ──────────────────────────────────────────
  # 3. Frontend イメージのビルド
  #    REACT_APP_API_URL にバックエンドの URL を渡す
  # ──────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-frontend
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:latest
      - --build-arg
      - REACT_APP_API_URL=${_BACKEND_URL}/api
      - ./frontend

  # ──────────────────────────────────────────
  # 4. Frontend イメージのプッシュ
  # ──────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-frontend
    waitFor: [build-frontend]
    args:
      - push
      - --all-tags
      - gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}

  # ──────────────────────────────────────────
  # 5. Backend を Cloud Run へデプロイ
  # ──────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-backend
    waitFor: [push-backend]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_BACKEND_SERVICE}
      - --image=gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=3001
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      # SQLite データは Cloud Run Volume (NFS/GCS FUSE) でマウント、
      # または Cloud SQL への移行を推奨。環境変数で DB パスを制御します。
      - --set-env-vars=NODE_ENV=production,DATABASE_PATH=/app/data/employees.db
      # JWT_SECRET など機密情報は Secret Manager で管理してください:
      # - --set-secrets=JWT_SECRET=jwt-secret:latest

  # ──────────────────────────────────────────
  # 6. Frontend を Cloud Run へデプロイ
  # ──────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-frontend
    waitFor: [push-frontend]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_FRONTEND_SERVICE}
      - --image=gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=80
      - --memory=256Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5

images:
  - gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/${_BACKEND_SERVICE}:latest
  - gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:$COMMIT_SHA
  - gcr.io/$PROJECT_ID/${_FRONTEND_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
